# The global library
# This library is loaded on all pages.
global:
  version: 1.0.0
  css:
    base:
      css/3.base/base.settings.css: {}
      css/3.base/base.reset.css: {}
      css/3.base/base.page.css: {}
      css/3.base/base.type.css: {}
    layout:
      css/4.objects/objects.container.css: {}
    component:
      css/5.components/components.icon.css: {}
      css/5.components/components.page.css: {}
      css/5.components/components.type.css: {}
    theme:
      css/6.utilities/utilities.clearfix.css: {}
      css/6.utilities/utilities.js.css: {}
      css/6.utilities/utilities.visibility.css: {}
# js:
#    js/base/base.global.js: {}


# Third party libraries
# Add them as dependencies to other libraries

choices:
  version: 11.1.0
  remote: https://github.com/Choices-js/Choices
  license:
    name: MIT
    url: https://github.com/Choices-js/Choices/blob/master/LICENSE
    gpl-compatible: true
  js:
    /libraries/choices.js/public/assets/scripts/choices.min.js: { minified: true, preprocess: false }

just-validate:
  version: 4.3.0
  remote: https://github.com/horprogs/Just-validate
  license:
    name: MIT
    url: https://github.com/horprogs/Just-validate/blob/master/LICENSE
    gpl-compatible: true
  js:
    /libraries/just-validate/dist/just-validate.production.min.js: { minified: true, preprocess: false }


